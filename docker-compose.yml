services:
  db:
    image: postgres:16
    container_name: catalogo-db
    environment:
      POSTGRES_DB: catalogodb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: catalogo-api
    depends_on:
      - db
    environment:
      DB_URL: jdbc:postgresql://db:5432/catalogodb
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"

volumes:
  postgres_data:
